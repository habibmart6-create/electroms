<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElectroMS — Inventory & Sales Management</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8f9fb}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}
    button{cursor:pointer;font-family:'DM Sans',sans-serif}
    button:hover{opacity:0.85}
    input,select{font-family:'DM Sans',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  bg:"#f8f9fb",sidebar:"#0d1117",accent:"#00c896",accentDark:"#00a87e",accentBg:"#e6faf5",
  text:"#0d1117",textMuted:"#6b7280",border:"#e5e7eb",white:"#ffffff",
  danger:"#ef4444",dangerBg:"#fef2f2",warning:"#f59e0b",warningBg:"#fffbeb",
  info:"#3b82f6",infoBg:"#eff6ff",
};

const PRODUCTS = [
  {id:1,name:'Samsung 55" QLED TV',brand:"Samsung",sku:"TV-SAM-001",barcode:"8801643140887",category:"TVs",cost:42000,price:68000,stock:12,minStock:3,warranty:"2 Years",status:"active"},
  {id:2,name:"LG 1.5 Ton Inverter AC",brand:"LG",sku:"AC-LG-002",barcode:"8806098715278",category:"Air Conditioners",cost:55000,price:89000,stock:2,minStock:3,warranty:"3 Years",status:"low"},
  {id:3,name:"Dawlance 14 Cu Ft Refrigerator",brand:"Dawlance",sku:"REF-DAW-003",barcode:"6931234567890",category:"Refrigerators",cost:38000,price:62000,stock:8,minStock:2,warranty:"5 Years",status:"active"},
  {id:4,name:"Haier Front Load 8kg Washer",brand:"Haier",sku:"WM-HAI-004",barcode:"6921234567891",category:"Washing Machines",cost:29000,price:48000,stock:0,minStock:2,warranty:"2 Years",status:"out"},
  {id:5,name:"Microwave Oven 30L",brand:"Panasonic",sku:"MW-PAN-005",barcode:"5099234567892",category:"Microwaves",cost:8500,price:14500,stock:15,minStock:5,warranty:"1 Year",status:"active"},
  {id:6,name:'Xiaomi 65" Smart TV',brand:"Xiaomi",sku:"TV-XIA-006",barcode:"6975234567893",category:"TVs",cost:58000,price:92000,stock:5,minStock:2,warranty:"2 Years",status:"active"},
];
const SALES = [
  {id:"INV-0041",customer:"Tariq Mehmood",items:3,total:145000,payment:"Card",status:"completed",time:"10:32 AM"},
  {id:"INV-0040",customer:"Ayesha Siddiqui",items:1,total:68000,payment:"Cash",status:"completed",time:"09:15 AM"},
  {id:"INV-0039",customer:"Bilal Khan",items:2,total:102500,payment:"Bank",status:"return_req",time:"Yesterday"},
  {id:"INV-0038",customer:"Fatima Zahra",items:1,total:14500,payment:"Cash",status:"completed",time:"Yesterday"},
  {id:"INV-0037",customer:"Hassan Ali",items:4,total:228000,payment:"Card",status:"completed",time:"2 days ago"},
];
const USERS = [
  {id:1,name:"Ahmad Raza",role:"Admin",email:"ahmad@electropk.com",status:"active",lastLogin:"Just now"},
  {id:2,name:"Sara Noor",role:"Salesperson",email:"sara@electropk.com",status:"active",lastLogin:"2 hrs ago"},
  {id:3,name:"Kamran Shah",role:"Store Manager",email:"kamran@electropk.com",status:"active",lastLogin:"Yesterday"},
  {id:4,name:"Zara Malik",role:"Salesperson",email:"zara@electropk.com",status:"inactive",lastLogin:"3 days ago"},
];
const REPORT_DATA = [
  {month:"Nov",revenue:820000},{month:"Dec",revenue:1240000},{month:"Jan",revenue:960000},
  {month:"Feb",revenue:1480000},{month:"Mar",revenue:1120000},{month:"Apr",revenue:1680000},
];
const CATEGORIES = ["All","TVs","Air Conditioners","Refrigerators","Washing Machines","Microwaves","Kitchen Appliances","Small Electronics"];
const NAV = [
  {id:"dashboard",icon:"⊞",label:"Dashboard"},{id:"products",icon:"📦",label:"Products"},
  {id:"pos",icon:"🧾",label:"Point of Sale"},{id:"inventory",icon:"🗃️",label:"Inventory"},
  {id:"sales",icon:"💳",label:"Sales History"},{id:"returns",icon:"↩️",label:"Returns"},
  {id:"customers",icon:"👥",label:"Customers"},{id:"reports",icon:"📊",label:"Reports"},
  {id:"users",icon:"🔐",label:"Users & Roles"},{id:"settings",icon:"⚙️",label:"Settings"},
];
const PAGE_TITLES = {
  dashboard:"Dashboard",products:"Product Management",pos:"Point of Sale (POS)",
  inventory:"Inventory Management",sales:"Sales History",returns:"Return Management",
  customers:"Customer Management",reports:"Reports & Analytics",users:"Users & Roles",settings:"Settings",
};

const fmt = n => "Rs " + n.toLocaleString("en-PK");

const Badge = ({status}) => {
  const map = {
    active:{bg:C.accentBg,color:C.accentDark,label:"Active"},low:{bg:C.warningBg,color:"#b45309",label:"Low Stock"},
    out:{bg:C.dangerBg,color:C.danger,label:"Out of Stock"},completed:{bg:C.accentBg,color:C.accentDark,label:"Completed"},
    return_req:{bg:C.warningBg,color:"#b45309",label:"Return Req."},Admin:{bg:"#f3e8ff",color:"#7c3aed",label:"Admin"},
    Salesperson:{bg:C.infoBg,color:"#1d4ed8",label:"Salesperson"},"Store Manager":{bg:"#fef3c7",color:"#92400e",label:"Store Manager"},
    inactive:{bg:"#f3f4f6",color:"#6b7280",label:"Inactive"},approved:{bg:C.accentBg,color:C.accentDark,label:"Approved"},
    rejected:{bg:C.dangerBg,color:C.danger,label:"Rejected"},pending:{bg:C.warningBg,color:"#b45309",label:"Pending"},
  };
  const s = map[status]||{bg:"#f3f4f6",color:"#374151",label:status};
  return <span style={{background:s.bg,color:s.color,borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{s.label}</span>;
};

const BarChart = ({data}) => {
  const max = Math.max(...data.map(d=>d.revenue));
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:12,height:150,padding:"0 8px"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <div style={{fontSize:11,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>{(d.revenue/1000).toFixed(0)}k</div>
          <div style={{width:"100%",background:`linear-gradient(180deg,${C.accent},${C.accentDark})`,borderRadius:"6px 6px 0 0",height:(d.revenue/max)*120}}/>
          <div style={{fontSize:11,color:C.textMuted,fontWeight:500}}>{d.month}</div>
        </div>
      ))}
    </div>
  );
};

const KpiCard = ({label,value,sub,icon,color}) => (
  <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:"20px 22px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontSize:13,color:C.textMuted,fontWeight:500,marginBottom:4}}>{label}</div>
        <div style={{fontSize:24,fontWeight:700,color:C.text,letterSpacing:-0.5}}>{value}</div>
        <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{sub}</div>
      </div>
      <div style={{fontSize:22,background:`${color}18`,borderRadius:12,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}>{icon}</div>
    </div>
  </div>
);

const Sidebar = ({active,onNav,collapsed}) => (
  <div style={{width:collapsed?64:240,background:C.sidebar,height:"100vh",display:"flex",flexDirection:"column",flexShrink:0,transition:"width 0.25s",overflow:"hidden",position:"fixed",left:0,top:0,zIndex:100}}>
    <div style={{padding:collapsed?"20px 0":"20px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #ffffff0f"}}>
      <div style={{width:32,height:32,background:C.accent,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚡</div>
      {!collapsed&&<div><div style={{color:"#fff",fontWeight:700,fontSize:15}}>ElectroMS</div><div style={{color:"#ffffff50",fontSize:11}}>Pro · Karachi</div></div>}
    </div>
    <nav style={{flex:1,padding:"10px 6px",overflowY:"auto"}}>
      {NAV.map(n=>(
        <button key={n.id} onClick={()=>onNav(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:collapsed?"9px 0":"9px 10px",justifyContent:collapsed?"center":"flex-start",background:active===n.id?"#ffffff12":"transparent",borderLeft:active===n.id?`3px solid ${C.accent}`:"3px solid transparent",color:active===n.id?"#fff":"#ffffff70",border:"none",borderRadius:8,marginBottom:2,fontSize:13,fontWeight:active===n.id?600:400,transition:"all 0.15s"}}>
          <span style={{fontSize:15,flexShrink:0}}>{n.icon}</span>
          {!collapsed&&<span>{n.label}</span>}
        </button>
      ))}
    </nav>
    <div style={{padding:collapsed?"14px 0":"14px 16px",borderTop:"1px solid #ffffff0f",display:"flex",alignItems:"center",gap:10,justifyContent:collapsed?"center":"flex-start"}}>
      <div style={{width:30,height:30,borderRadius:"50%",background:C.accentDark,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>AR</div>
      {!collapsed&&<div><div style={{color:"#fff",fontSize:13,fontWeight:600}}>Ahmad Raza</div><div style={{color:"#ffffff50",fontSize:11}}>Admin</div></div>}
    </div>
  </div>
);

const Topbar = ({title,onToggle}) => (
  <div style={{height:60,background:C.white,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 24px",gap:16,position:"sticky",top:0,zIndex:50}}>
    <button onClick={onToggle} style={{background:"none",border:"none",fontSize:18,color:C.textMuted,padding:4}}>☰</button>
    <div style={{flex:1,fontWeight:700,fontSize:16,color:C.text}}>{title}</div>
    <div style={{background:C.accentBg,color:C.accentDark,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600}}>🟢 Live Demo</div>
    <div style={{width:34,height:34,borderRadius:"50%",background:C.accentDark,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12}}>AR</div>
  </div>
);

const Dashboard = () => (
  <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14}}>
      <KpiCard label="Total Products" value="142" sub="4 added this week" icon="📦" color={C.info}/>
      <KpiCard label="Today's Sales" value="Rs 2,13,000" sub="+18% vs yesterday" icon="💳" color={C.accent}/>
      <KpiCard label="Monthly Revenue" value="Rs 16.8L" sub="+12% vs last month" icon="📈" color="#7c3aed"/>
      <KpiCard label="Low Stock Alerts" value="3 Items" sub="Action needed" icon="⚠️" color={C.warning}/>
      <KpiCard label="Returned Items" value="2 Pending" sub="Needs approval" icon="↩️" color={C.danger}/>
      <KpiCard label="Best Seller" value="Samsung TV" sub="12 units this month" icon="🏆" color="#f59e0b"/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:22}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:18}}>Monthly Revenue</div>
        <BarChart data={REPORT_DATA}/>
      </div>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:22}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Recent Sales</div>
        {SALES.slice(0,4).map(s=>(
          <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.bg,borderRadius:10,marginBottom:8}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{s.customer}</div><div style={{fontSize:11,color:C.textMuted}}>{s.id} · {s.time}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{fmt(s.total)}</div><Badge status={s.status}/></div>
          </div>
        ))}
      </div>
    </div>
    <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:22}}>
      <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Low Stock Alerts</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:12}}>
        {PRODUCTS.filter(p=>p.stock<=p.minStock).map(p=>(
          <div key={p.id} style={{display:"flex",gap:12,alignItems:"center",background:C.warningBg,borderRadius:12,padding:"12px 16px",border:"1px solid #fde68a"}}>
            <div style={{fontSize:26}}>📦</div>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{p.name}</div><div style={{fontSize:11,color:C.textMuted}}>SKU: {p.sku}</div><div style={{fontSize:12,color:"#b45309",fontWeight:600,marginTop:2}}>Stock: {p.stock} / Min: {p.minStock}</div></div>
            <button style={{background:C.accent,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600}}>Reorder</button>
          </div>
        ))}
      </div>
    </div>
  </div>
);

const Products = () => {
  const [search,setSearch] = React.useState("");
  const [cat,setCat] = React.useState("All");
  const [showAdd,setShowAdd] = React.useState(false);
  const filtered = PRODUCTS.filter(p=>(cat==="All"||p.category===cat)&&(p.name.toLowerCase().includes(search.toLowerCase())||p.sku.toLowerCase().includes(search.toLowerCase())));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or SKU" style={{flex:1,minWidth:180,padding:"9px 14px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,outline:"none"}}/>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,outline:"none",background:C.white}}>
          {CATEGORIES.map(c=><option key={c}>{c}</option>)}
        </select>
        <button onClick={()=>setShowAdd(!showAdd)} style={{background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:600}}>+ Add Product</button>
      </div>
      {showAdd&&(
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:22}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><div style={{fontWeight:700,fontSize:15}}>Add New Product</div><button onClick={()=>setShowAdd(false)} style={{background:"none",border:"none",fontSize:20,color:C.textMuted}}>x</button></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:12}}>
            {["Product Name","Brand","Model Number","SKU","Category","Cost Price","Sale Price","Warranty","Supplier","Min Stock Alert","Quantity"].map(f=>(
              <div key={f}><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:"block",marginBottom:4}}>{f}</label><input placeholder={f} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,outline:"none"}}/></div>
            ))}
          </div>
          <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowAdd(false)} style={{padding:"9px 20px",borderRadius:10,border:`1px solid ${C.border}`,background:C.white,fontSize:13}}>Cancel</button>
            <button onClick={()=>setShowAdd(false)} style={{padding:"9px 20px",borderRadius:10,border:"none",background:C.accent,color:"#fff",fontSize:13,fontWeight:600}}>Save Product</button>
          </div>
        </div>
      )}
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:C.bg}}>{["Product","SKU","Category","Price","Stock","Status","Actions"].map(h=><th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:12,fontWeight:600,color:C.textMuted,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map((p,i)=>(
              <tr key={p.id} style={{borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none"}}>
                <td style={{padding:"12px 14px"}}><div style={{fontWeight:600,fontSize:13}}>{p.name}</div><div style={{fontSize:11,color:C.textMuted}}>{p.brand} - {p.warranty}</div></td>
                <td style={{padding:"12px 14px",fontFamily:"'DM Mono',monospace",fontSize:12}}>{p.sku}</td>
                <td style={{padding:"12px 14px",fontSize:13,color:C.textMuted}}>{p.category}</td>
                <td style={{padding:"12px 14px"}}><div style={{fontSize:13,fontWeight:700}}>{fmt(p.price)}</div><div style={{fontSize:11,color:C.textMuted}}>Cost: {fmt(p.cost)}</div></td>
                <td style={{padding:"12px 14px"}}><div style={{fontSize:13,fontWeight:p.stock<=p.minStock?700:400,color:p.stock===0?C.danger:p.stock<=p.minStock?"#b45309":C.text}}>{p.stock} units</div></td>
                <td style={{padding:"12px 14px"}}><Badge status={p.status}/></td>
                <td style={{padding:"12px 14px"}}><button style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:C.white,fontSize:12}}>Edit</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const POS = () => {
  const [cart,setCart] = React.useState([{...PRODUCTS[0],qty:1},{...PRODUCTS[4],qty:2}]);
  const [discount,setDiscount] = React.useState(5);
  const [payment,setPayment] = React.useState("Cash");
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discAmt = Math.round(subtotal*discount/100);
  const tax = Math.round((subtotal-discAmt)*0.05);
  const total = subtotal-discAmt+tax;
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:14}}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <input placeholder="Scan barcode or enter SKU and press Enter" style={{padding:"11px 16px",borderRadius:10,border:`2px solid ${C.accent}`,fontSize:13,outline:"none"}}/>
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
          <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.border}`,fontWeight:700,fontSize:14}}>Cart Items</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.bg}}>{["Product","Price","Qty","Total",""].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:12,fontWeight:600,color:C.textMuted,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>
            <tbody>
              {cart.map((item,i)=>(
                <tr key={item.id} style={{borderBottom:i<cart.length-1?`1px solid ${C.border}`:"none"}}>
                  <td style={{padding:"11px 14px"}}><div style={{fontWeight:600,fontSize:13}}>{item.name}</div><div style={{fontSize:11,color:C.textMuted}}>{item.sku}</div></td>
                  <td style={{padding:"11px 14px",fontSize:13}}>{fmt(item.price)}</td>
                  <td style={{padding:"11px 14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={()=>setCart(cart.map(c=>c.id===item.id?{...c,qty:Math.max(1,c.qty-1)}:c))} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.border}`,background:C.white,fontSize:14}}>-</button>
                      <span style={{fontWeight:700,minWidth:22,textAlign:"center"}}>{item.qty}</span>
                      <button onClick={()=>setCart(cart.map(c=>c.id===item.id?{...c,qty:c.qty+1}:c))} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.border}`,background:C.white,fontSize:14}}>+</button>
                    </div>
                  </td>
                  <td style={{padding:"11px 14px",fontWeight:700,fontSize:13}}>{fmt(item.price*item.qty)}</td>
                  <td style={{padding:"11px 14px"}}><button onClick={()=>setCart(cart.filter(c=>c.id!==item.id))} style={{background:C.dangerBg,color:C.danger,border:"none",borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600}}>X</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {PRODUCTS.slice(0,4).map(p=>(
            <button key={p.id} onClick={()=>{const ex=cart.find(c=>c.id===p.id);if(ex)setCart(cart.map(c=>c.id===p.id?{...c,qty:c.qty+1}:c));else setCart([...cart,{...p,qty:1}]);}} style={{padding:"10px 6px",borderRadius:10,border:`1px solid ${C.border}`,background:C.white,fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.4}}>
              {p.name.slice(0,22)}
            </button>
          ))}
        </div>
      </div>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:20,display:"flex",flexDirection:"column",gap:12,height:"fit-content"}}>
        <div style={{fontWeight:700,fontSize:15}}>Invoice Summary</div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.textMuted}}><span>Subtotal</span><span style={{fontWeight:600,color:C.text}}>{fmt(subtotal)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,color:C.textMuted}}>
          <span>Discount %</span>
          <input type="number" value={discount} onChange={e=>setDiscount(Number(e.target.value))} style={{width:60,padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:13,textAlign:"center",outline:"none"}}/>
        </div>

    dashboard:<Dashboard/>,products:<Products/>,pos:<POS/>,
    inventory:<Inventory/>,sales:<SalesHistory/>,returns:<Returns/>,
    customers:<Customers/>,reports:<Reports/>,users:<UsersRoles/>,settings:<Settings/>
  };
  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
      <Sidebar active={page} onNav={setPage} collapsed={collapsed}/>
      <div style={{marginLeft:sidebarW,flex:1,minWidth:0,transition:"margin-left 0.25s"}}>
        <Topbar title={PAGE_TITLES[page]} onToggle={()=>setCollapsed(c=>!c)}/>

      </div>
    </div>
  );
}
